        /* ENCABEZADO */
        header {
            background-color: #ff7f2a;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header h1 {
            font-size: 80px;
            margin: 0;
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            display: flex;
            height: calc(100vh - 120px);
        }

        /* MENU LATERAL */
        .menu {
            width: 280px;
            background-color: #febd5d;
            display: flex;
            flex-direction: column;
        }

        .menu button {
            background-color: #f95956;
            border: 3px solid rgba(255, 4, 4, 0);
            border-bottom: 20px solid rgba(255, 255, 255, 0);
            padding: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
        }

        .menu button:hover {
            background-color: #ffb8b8;
        }

        /* AREA DE CONTENIDO */
        .content {
            flex: 1;
            background-color: #ffffff;
            padding: 40px;

<h2>Reglamento interno de la empresa</h2>

<p>Normas internas de la Empresa.</p>

<ul>
<li>    <strong>     Articulo 1.</strong> Bajo ninguna circunstancia se tolerarán actos que falten al respeto. Cada individuo es legal y éticamente responsable de garantizar un lugar de trabajo seguro y ambientalmente responsable, sin excepciones.</li>
<br>
<li>    <strong>    Articulo 2. </strong> Toda comunicación debe ser respetuosa, clara y orientada al trabajo. Es responsabilidad de cada colaborador promover un diálogo digno, escuchar activamente a sus compañeros y resolver cualquier diferencia a través de los canales establecidos, priorizando siempre el bienestar del equipo.</li>
<br>
<li>    <strong>    Articulo 3. </strong> Absolutamente prohibido el uso de tabaco, vapeadores, alcohol y drogas, así como de toda sustancia que produzca alteración de la percepción de la realidad, capacidad de actuar y reaccionar dentro del horario laboral.</li>
<br>
<li>    <strong>    Articulo 4. </strong> Se prohíbe estrictamente emplear los dispositivos y recursos de la empresa para cualquier actividad que no sea estrictamente con fines profesionales. </li>
<br>
<li>    <strong>    Articulo 5. </strong> El personal tiene la obligación de cumplir con el horario de trabajo establecido por la organización. Toda falta de puntualidad o asistencia deberá ser comunicada de inmediato y justificada mediante la entrega del comprobante.</li>
<br>
<li>    <strong>    Articulo 6. </strong> Obligatorio el uso del uniforme completo (incluyendo la gabacha y el gafete debidamente puestos) durante toda la jornada laboral.</li>
<br>
<li>    <strong>    Articulo 7. </strong> Es responsabilidad de cada colaborador mantener la limpieza y el orden de su estación de trabajo y de las áreas comunes utilizadas. Al finalizar cada actividad o jornada, el espacio debe quedar libre de residuos y en condiciones óptimas para su uso inmediato por otros. </li>
<br>
<li>    <strong>    Articulo 8. </strong> El personal debe velar por la integridad de las herramientas y equipos asignados. Es obligatorio reportar cualquier falla de inmediato.</li>
<br>
<li>    <strong>    Articulo 9. </strong> El consumo de alimentos debe realizarse exclusivamente en los horarios y áreas asignadas.</li>
<br>

<h2>Buenas prácticas de desarrolladores</h2>

<p>Ejemplos de prácticas recomendadas:</p>

<ul>
<li>Una de las cosas más importantes es escribir código que sea fácil de entender. 
En vez de usar nombres raros o letras al azar es mejor usar palabras que expliquen lo que hace cada cosa. Así si otra persona ve el código puede entenderlo más rápido y no se confunde.</li>
<br>
<li>También es buena idea poner algunos comentarios en el código. Los comentarios sirven para explicar partes que tal vez no se entienden tan fácil. No hay que comentar todo pero sí lo que pueda causar dudas.</li>
<br>
<li>Otra práctica importante es probar el programa antes de entregarlo. Muchos errores pasan porque el desarrollador no revisó bien lo que hizo. Si pruebas el programa varias veces es más fácil encontrar fallas y arreglarlas antes de que alguien más las vea.</li>
<br>
<li>Los desarrolladores también tratan de mantener todo organizado. Eso significa separar el código en diferentes partes o archivos para que no quede todo mezclado. Cuando un proyecto crece mucho esto ayuda bastante a no perderse.</li>

</ul>
